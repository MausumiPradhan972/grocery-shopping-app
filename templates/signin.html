<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <title>signin</title>
</head>
<body>
    <div class=" container-fluid  py-5" >
    <div class="row" >
        <div class="col-6">
            <div class="text-center d-flex align-items-center justify-content-center" style="background-color: green; color: white;height: 500px;">
                 <div class="text-center">
                    <h1 class="mb-5">Welcome Back!!!</h1>
                    <p class="mb-3">to keep connected with us please login with your personal info.</p>
                    <button style="color: white;" type="button" class="btn btn-outline-light">Sign In</button>
                 </div>
            </div>
        </div>
        <div class="col-6">
            <div class="text-center">
                <h1 style="color: green;" class="py-4">Create Account</h1>
                <h2>
                    <i class="bi bi-instagram"></i>
                    <i class="bi bi-google"></i>
                    <i class="bi bi-linkedin"></i>
                </h2>
                <p class="mt-3">or use your email for registration</p>
                <form method="POST" action="{% url 'signin' %}" id="submitForm"  class="mt-3">
                    {% csrf_token %}
                    <input id="name" name="name" type="text" placeholder="name"  
                    class="form-control form-control-md mx-5 mb-3" required>
                    <input id="email" name="email" type="text" placeholder="email"  
                    class="form-control form-control-md mx-5 mb-3" required>
                    <input id="password" name="password" type="text" placeholder="password"  
                    class="form-control form-control-md mx-5 mb-5"required>
                   <button id="signinbtn"  type="submit"  
                   style="color: white; background-color: green;" class="btn btn-lg" >Sign In</button>
                </form>
                <p id="para" style="color: red;"></p>
            </div>
        </div>
    </div>
</div>
{% load static %}
<script>
    console.log("hii")
 document.addEventListener("DOMContentLoaded",function(e){
    let form = document.getElementById("submitForm");
           form.addEventListener("submit",function(e){
            let personName= document.getElementById("name").value.trim();
           let email= document.getElementById("email").value.trim();
           let password= document.getElementById("password").value.trim();
           let p=document.getElementById("para");
           console.log(personName)
          
            console.log("hiii");
            if (personName===""||email===""||password==="" ){
                e.preventDefault();
                console.log("empty");
                p.textContent="all fields are required";
            }
            else{
                document.location.href="home/";
            }
           })
 })
</script>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
        <script src={% static "js/app.js" %} >
           
          
           
            
           
        </script>
</body>
</html>
