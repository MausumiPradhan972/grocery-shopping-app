<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>
<body>
    <div class="container py-5">
       <form action="">
           {% csrf_token %}
           <div>
                    <label   class="form-label">Your Name</label>
                    <input type="text" class="inp form-control"   placeholder="enter your name" required>
                </div>
                 <div>
                    <label  class="form-label">Email ID</label>
                    <input type="text" class="inp form-control"   placeholder="enter your email id" required>
                </div>
                 <div>
                    <label  class="form-label">Mobile Number</label>
                    <input type="text" class="inp form-control"   placeholder="enter your mobile number" required>
                </div>
                <div>
                    <label  class="form-label">Address</label>
                    <textarea class="inp form-control"  rows="3" placeholder="Enter your address" required></textarea>
                </div>
                <div class="py-5">
                    <button  id="btn" class="btn btn-primary" style="width: 50%; margin-left: 20%;">Submit </button>
                </div>
            <div>
        </form>
    </div>
    <script>
        let inputs=document.querySelectorAll(".inp")
        let btn=document.getElementById("btn");
        inputs.forEach(input=>{
            input.addEventListener("input",function(){
                let allfilled=true;
                inputs.forEach(inp=>{
                    if(inp.value.length===0){
                        allfilled=false;
                    }
                });
                btn.disabled=!allfilled;
            })
        });
    </script>
</body>
</html>
