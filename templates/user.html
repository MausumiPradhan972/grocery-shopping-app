<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>
<body>
    <div>
        <div class="text-center  pt-5">
            <svg  xmlns="http://www.w3.org/2000/svg" width="100" height="100" fill="currentColor" class="bi bi-person-circle" viewBox="0 0 16 16">
               <path d="M11 6a3 3 0 1 1-6 0 3 3 0 0 1 6 0"/>
               <path fill-rule="evenodd" d="M0 8a8 8 0 1 1 16 0A8 8 0 0 1 0 8m8-7a7 7 0 0 0-5.468 11.37C3.242 11.226 4.805 10 8 10s4.757 1.225 5.468 2.37A7 7 0 0 0 8 1"/>
            </svg>
            <a href="{% url 'detail' %}"><p><i class="bi bi-pen"></i>enter personal details</p></a>
        </div>
        <div class="text-center">
            <p id="username" style="font-weight: bold;">{{myuser.name}}</p>
        </div>
        <div class="container text-center py-5">
        <div style="gap: 100px;" class="row d-flex  align-item-center justify-content-center"> 
            <div class="col-4 shadow" style="height: 120px; width: 100px;">
               <h1 class="pt-4"> <i class="bi bi-box-seam-fill "></i></h1>
               <span>Orders</span>
            </div>
            <div class="col-4 shadow" style="height: 120px; width: 100px;">
               <a href="{% url 'wishlist' %}" style="text-decoration: none; "><button style="outline: none; border: 2px white;">
               <h1 class="pt-4"> <i class="bi bi-bag-heart-fill "></i></h1>
               <span>Wishlist</span>
               </button> </a>
            </div>
            <div class="col-4 shadow" style="height: 120px; width: 100px;">
               <h1 class="pt-4"> <i class="bi bi-gift-fill "></i></h1>
               <span>Offers</span>
            </div>
            <div class="col-4 shadow" style="height: 120px; width: 100px;">
               <h1 class="pt-4"> <i class="bi bi-question-circle-fill "></i></h1>
               <span>Help</span>
            </div>
        </div>
        </div>
        <div class="text-center py-5" >
            <a>
               <button id="signout" onclick="signOut()"  style="width: 200px;" class="btn btn-secondary"> signout</button>
            </a>       
        </div>
        
    </div>
    {% load  static %}
    <script>
        const signinURl="{% url 'signin' %}"
    </script>
       <script >
      function signOut(){
    console.log("hey");
    let result=confirm("are you sure you want to signout?");
    console.log(result);
    if (result){
        console.log("out");
        window.location.href=signinURl;
    }
    console.log("hii");
}
</script>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
        
    </body>
</html>
