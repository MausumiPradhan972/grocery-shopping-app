{% extends "base.html" %}
{% block title %}Packaged foods{% endblock title %}
{% load static %}
{% block body %}


<div>
    <div><h2 class="text-center py-3 fw-bold text-decoration-underline">Packaged Foods</h2></div>
    <div>
      
      <div class="container ">
        <div class="row" style="display: grid;grid-template-columns: repeat(3,1fr); gap: 20px; width: 100%; ">
          {% for product in products %}
          <div class="product" style="padding: 10px;text-align: center ;"> 
          <div class="">
            <div style="text-align: center;">
              <div><a href=""><img class="shadow" src="{{product.image.url}}" alt="" style="height: 200px; width: 300px; "></div></a>
              <div style="" class="py-3">
                <span style=" font-weight: bold; margin-bottom: 0; " >{{product.name}}</span><br>
                <span>{{product.price}} Rupees</span><br>
                <span ><button class="wishlist btn btn-danger-fill shadow" onClick="addToWishlist({{product.id}})" style="margin-right: 10px;"> <i class="bi bi-heart"></i></button>
                  <a href="{% url 'cart' %}">
                    <button onClick="addToCart({{product.id}})" data-id="{{product.id}}" data-name="{{product.name}}" data-price="{{product.price}}" type="button" class=" cart btn btn-primary mt-2">Add to cart</button>
                 </a>
                   </span>
              </div>
            </div>
          </div>
         </div> 
          {% endfor %}
          <p id="p"></p>
       </div>
     </div>
      
   </div>


</div> 



<script>
  const addToCartURL="{% url 'cart' %}"
     console.log("js loaded");
 console.log(addToCartURL);
document.addEventListener("DOMContentLoaded",function(){
    let p=document.getElementById("p");
let cartbtn=document.querySelectorAll(".cart");
    cartbtn.forEach(button=>{
        button.addEventListener("click",function(e){
        e.preventDefault();
        alert("added");
         console.log(this.dataset.id);
         console.log(this.dataset.name)
        // alert("added");    
        // pname=document.getElementsByClassName("productName").innerText;
        
        
    });
    });
     
});

console.log("js loaded")
  window.addToCart=function(id){
    console.log("clicked",id);
    if(!id){
        console.error("invalid id",id);
        return;
    }
    let cart=JSON.parse(localStorage.getItem('cart'))||[];
    cart=cart.filter(item=>item!=null);
    let existingItem=cart.find(item=>item.id===id);
    if(existingItem){
        alert("already in cart");
    }else{
        cart.push({
            id:Number(id),
            quantity:1
        });
    }
     console.log(JSON.parse(localStorage.getItem('cart')))
    console.log("adding",id);
    localStorage.setItem("cart",JSON.stringify(cart));
    console.log("hiii")
   
    console.log("cart : ",cart)
     console.log("added");
    
  }
   window.addToWishlist=function(id){
    console.log("clicked wishlist",id);
     if(!id){
        console.error("invalid id",id);
        return; 
    }
    let wishlist=JSON.parse(localStorage.getItem('wishlist'))||[];
    console.log("addingw",id);
    wishlist.push(id);
     localStorage.setItem("wishlist",JSON.stringify(wishlist));
    console.log("wishlist : ",wishlist)
     console.log("addedw");
  } 
  
</script>
