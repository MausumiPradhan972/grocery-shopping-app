{% extends "base.html" %}
{% block title %}Cooking Essential{% endblock title %}
{% block body %}
{% load static %}
<div>
    <div><h2 class="text-center py-3 fw-bold text-decoration-underline">Cooking Essentials</h2></div>
    <div>
      <div class="container text-center ">
         <div class="row align-items-start" style="display: grid;grid-template-columns: repeat(3,1fr); gap: 20px; ">
           {% for product in products %}
          <div class="product" style="padding: 10px; text-align: center;"> 
          <div class="py-5">
            <div>
              <div><a href=""><img class="shadow" src="{{product.image.url}}" alt="" style="height: 200px; width: 250px;"></div></a>
              <div class="py-3">
                <span class="fw-bold">{{product.name}}</span><br>
                <span>{{product.price}} Rupees</span><br>
                <span ><button class="wishlist btn btn-danger-fill shadow" onClick="addToWishlist({{product.id}})" style="margin-right: 10px;"> <i class="bi bi-heart"></i></button>
                  <button onClick="addToCart({{product.id}})" data-id="{{product.id}}" data-name="{{product.name}}" data-price="{{product.price}}" type="button" class=" cart btn btn-primary mt-2">Add to cart</button></span>
                 
              </div>
            </div>
          </div>
        </div>
        {% endfor %}
       </div>
     </div>
   </div>
</div>
<script>
    const addToCartURL="{% url 'cart' %}"
     console.log("js loaded");
 console.log(addToCartURL);
document.addEventListener("DOMContentLoaded",function(){
    let p=document.getElementById("p");
let cartbtn=document.querySelectorAll(".cart");
    cartbtn.forEach(button=>{
        button.addEventListener("click",function(e){
        e.preventDefault();
        alert("added");
         console.log(this.dataset.id);
         console.log(this.dataset.name)
        // alert("added");    
        // pname=document.getElementsByClassName("productName").innerText;
        
        
    });
    });
     
});

console.log("js loaded")
  window.addToCart=function(id){
    console.log("clicked",id);
    if(!id){
        console.error("invalid id",id);
        return;
    }
    let cart=JSON.parse(localStorage.getItem('cart'))||[];
    cart=cart.filter(item=>item!=null);
    let existingItem=cart.find(item=>item.id===id);
    if(existingItem){
        alert("already in cart");
    }else{
        cart.push({
            id:Number(id),
            quantity:1
        });
    }
     console.log(JSON.parse(localStorage.getItem('cart')))
    console.log("adding",id);
    localStorage.setItem("cart",JSON.stringify(cart));
    console.log("hiii")
   
    console.log("cart : ",cart)
     console.log("added");
    
  }
   window.addToWishlist=function(id){
    console.log("clicked wishlist",id);
     if(!id){
        console.error("invalid id",id);
        return; 
    }
    let wishlist=JSON.parse(localStorage.getItem('wishlist'))||[];
    console.log("addingw",id);
    wishlist.push(id);
     localStorage.setItem("wishlist",JSON.stringify(wishlist));
    console.log("wishlist : ",wishlist)
     console.log("addedw");
  } 
</script>
